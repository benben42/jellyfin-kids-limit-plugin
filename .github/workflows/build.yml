name: Build Plugin

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.KidsLimit.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.KidsLimit.csproj --configuration Release --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.KidsLimit
          path: bin/Release/net9.0/Jellyfin.Plugin.KidsLimit.dll
          if-no-files-found: error
