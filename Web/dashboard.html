<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Kids Watch-Time Dashboard</title>
</head>
<body>
<div id="kidsLimitDashboardPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button">
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection">
                <h2 class="sectionTitle">Kids Watch-Time Dashboard
                    <button is="emby-button" type="button" id="btnRefresh" class="raised"
                            style="margin-left:1em;"><span>Refresh</span></button>
                    <a is="emby-linkbutton" class="raised" href="configurationpage?name=KidsLimitConfig"
                       style="margin-left:.5em;"><span>Settings</span></a>
                </h2>
                <p id="dashStatus" class="fieldDescription"></p>
            </div>
            <div id="cards"></div>
        </div>
    </div>

    <script type="text/javascript">
    (function () {
        var pluginId = 'a1e5c7f2-3b4d-4e6a-9c8b-2d1f0e3a5b7c';
        var page;
        var token = '';
        var refreshTimer;
        var chores = []; // from plugin config; drives the one-tap earn buttons

        function esc(s) { return (s || '').toString().replace(/[&<>"]/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

        function fmt(sec) {
            sec = Math.max(0, Math.round(sec || 0));
            var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
            if (h > 0) { return h + 'h ' + m + 'm'; }
            return m + 'm';
        }
        function capText(min) { return (min === null || min === undefined) ? '∞' : fmt(min * 60); }

        function api(path, method) {
            var url = ApiClient.getUrl('KidsLimit/' + path);
            url += (url.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(token);
            return ApiClient.ajax({ type: method || 'GET', url: url, dataType: 'json' });
        }

        function windowRow(label, used, cap) {
            var over = (cap !== null && cap !== undefined && used > cap * 60);
            return '<div style="display:flex;justify-content:space-between;">' +
                '<span>' + label + '</span>' +
                '<span style="' + (over ? 'color:#c00;font-weight:bold;' : '') + '">' +
                fmt(used) + ' / ' + capText(cap) + '</span></div>';
        }

        function renderCard(s) {
            var remaining = s.HasLimit ? fmt(s.EffectiveRemainingSeconds) : '∞';
            var remColor = (s.HasLimit && s.EffectiveRemainingSeconds <= 0) ? '#c00'
                : (s.HasLimit && s.EffectiveRemainingSeconds <= 600) ? '#e67e00' : '#2a2';

            var html = '<div class="paperList" style="padding:1em;margin-bottom:1em;" data-userid="' + esc(s.UserId) + '">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                '<h3 style="margin:0;">' + esc(s.UserName) + '</h3>' +
                '<span class="fieldDescription">' + esc(s.PresetName) + ' · ' + esc(s.CurrentWindow) + '</span></div>' +
                (s.ManuallyStopped
                    ? '<div style="color:#c00;font-weight:bold;">■ Stopped by parent</div>'
                    : (s.Blocked ? '<div style="color:#c00;font-weight:bold;">■ Currently blocked (over limit)</div>' : '')) +
                '<div style="font-size:1.4em;margin:.3em 0;color:' + remColor + ';">' +
                'Remaining: <strong>' + remaining + '</strong>' +
                (s.HasLimit && s.BindingCap ? ' <span class="fieldDescription">(' + esc(s.BindingCap) + ' cap)</span>' : '') +
                '</div>' +
                '<div>Watched today: <strong>' + fmt(s.SecondsWatchedTotal) + '</strong> / ' + capText(s.DailyCapMinutes) +
                (s.BonusSeconds > 0 ? ' <span style="color:#2a2;">(+' + fmt(s.BonusSeconds) + ' bonus)</span>' : '') + '</div>' +
                '<div>Current session: ' + fmt(s.CurrentSessionSeconds) + ' / ' + capText(s.SessionCapMinutes) + '</div>' +
                '<div style="margin:.5em 0;">' +
                windowRow('Morning', s.SecondsMorning, s.MorningCapMinutes) +
                windowRow('Afternoon', s.SecondsAfternoon, s.AfternoonCapMinutes) +
                windowRow('Evening', s.SecondsEvening, s.EveningCapMinutes) +
                '</div>' +
                '<div id="hist-' + esc(s.UserId) + '" class="fieldDescription">History…</div>' +
                '<div id="wallet-' + esc(s.UserId) + '" style="margin:.5em 0;padding:.5em .75em;' +
                'border:1px solid rgba(127,127,127,.35);border-radius:6px;">Coins…</div>' +
                '<div style="margin-top:.5em;">' +
                bonusBtn(s.UserId, 10) + bonusBtn(s.UserId, 30) + bonusBtn(s.UserId, 60) +
                '<button is="emby-button" type="button" class="raised btnCustom" data-userid="' + esc(s.UserId) + '"><span>+ custom</span></button>' +
                (s.ManuallyStopped
                    ? '<button is="emby-button" type="button" class="raised button-submit btnAllow" data-userid="' + esc(s.UserId) + '"><span>Allow again</span></button>'
                    : '<button is="emby-button" type="button" class="raised button-cancel btnStop" data-userid="' + esc(s.UserId) + '"><span>Stop now</span></button>') +
                '</div></div>';
            return html;
        }

        function bonusBtn(userId, mins) {
            return '<button is="emby-button" type="button" class="raised btnBonus" data-userid="' + esc(userId) +
                '" data-mins="' + mins + '"><span>+' + mins + '</span></button>';
        }

        function wire() {
            page.querySelectorAll('.btnBonus').forEach(function (b) {
                b.onclick = function () { grant(this.getAttribute('data-userid'), parseInt(this.getAttribute('data-mins'), 10)); };
            });
            page.querySelectorAll('.btnCustom').forEach(function (b) {
                b.onclick = function () {
                    var uid = this.getAttribute('data-userid');
                    var v = prompt('Bonus minutes to grant (negative to remove):', '15');
                    if (v !== null) { var n = parseInt(v, 10); if (n) { grant(uid, n); } }
                };
            });
            page.querySelectorAll('.btnStop').forEach(function (b) {
                b.onclick = function () { stop(this.getAttribute('data-userid')); };
            });
            page.querySelectorAll('.btnAllow').forEach(function (b) {
                b.onclick = function () { allow(this.getAttribute('data-userid')); };
            });
        }

        function grant(userId, mins) {
            api('bonus?user=' + encodeURIComponent(userId) + '&minutes=' + mins, 'POST')
                .then(load, function () { Dashboard.alert('Failed to grant bonus.'); });
        }
        function stop(userId) {
            api('stop?user=' + encodeURIComponent(userId), 'POST')
                .then(function () { setTimeout(load, 500); }, function () { Dashboard.alert('Failed to stop.'); });
        }
        function allow(userId) {
            api('allow?user=' + encodeURIComponent(userId), 'POST')
                .then(function () { setTimeout(load, 500); }, function () { Dashboard.alert('Failed to allow.'); });
        }

        function renderWallet(userId, w) {
            var el = page.querySelector('#wallet-' + userId);
            if (!el) { return; }

            var html = '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                '<span>🪙 <strong>' + w.CoinBalance + '</strong> coin(s) = ' + fmt(w.CoinBalance * w.CoinMinutes * 60) +
                (w.CoinsRedeemedToday ? ' <span class="fieldDescription">(redeemed today: ' + w.CoinsRedeemedToday + ')</span>' : '') +
                '</span></div>';

            (w.PendingClaims || []).forEach(function (c) {
                html += '<div style="display:flex;align-items:center;gap:.5em;margin:.25em 0;">' +
                    '<span style="flex:1 1 auto;">⏳ ' + esc(c.ChoreName) + ' <strong>🪙' + c.Coins + '</strong>' +
                    ' <span class="fieldDescription">' + new Date(c.ClaimedAtUtc).toLocaleTimeString() + '</span></span>' +
                    '<button is="emby-button" type="button" class="raised button-submit btnClaim" data-userid="' + esc(userId) +
                    '" data-claim="' + esc(c.Id) + '" data-op="approve" style="min-width:3em;"><span>✓</span></button>' +
                    '<button is="emby-button" type="button" class="raised button-cancel btnClaim" data-userid="' + esc(userId) +
                    '" data-claim="' + esc(c.Id) + '" data-op="reject" style="min-width:3em;"><span>✗</span></button></div>';
            });

            html += '<div style="margin-top:.4em;">';
            chores.forEach(function (c) {
                if (c.Enabled === false) { return; }
                html += '<button is="emby-button" type="button" class="raised btnEarn" data-userid="' + esc(userId) +
                    '" data-chore="' + esc(c.Id) + '" title="' + esc(c.Name) + '">' +
                    '<span>+' + esc(c.Icon || '⭐') + '🪙' + c.Coins + '</span></button>';
            });
            html += '<button is="emby-button" type="button" class="raised btnRedeemCoins" data-userid="' + esc(userId) +
                '"><span>Spend coins…</span></button>' +
                '<button is="emby-button" type="button" class="raised btnAdjustCoins" data-userid="' + esc(userId) +
                '"><span>± adjust</span></button></div>';

            el.innerHTML = html;

            el.querySelectorAll('.btnClaim').forEach(function (b) {
                b.onclick = function () {
                    var uid = this.getAttribute('data-userid');
                    api('claims/' + this.getAttribute('data-op') +
                        '?user=' + encodeURIComponent(uid) +
                        '&claimId=' + encodeURIComponent(this.getAttribute('data-claim')), 'POST')
                        .then(function (wallet) { renderWallet(uid, wallet); },
                              function () { Dashboard.alert('Claim update failed.'); });
                };
            });
            el.querySelectorAll('.btnEarn').forEach(function (b) {
                b.onclick = function () {
                    var uid = this.getAttribute('data-userid');
                    api('wallet/earn?user=' + encodeURIComponent(uid) +
                        '&choreId=' + encodeURIComponent(this.getAttribute('data-chore')), 'POST')
                        .then(function (wallet) { renderWallet(uid, wallet); },
                              function () { Dashboard.alert('Failed to add coins.'); });
                };
            });
            el.querySelectorAll('.btnRedeemCoins').forEach(function (b) {
                b.onclick = function () {
                    var uid = this.getAttribute('data-userid');
                    var v = prompt('Coins to spend as watch time now:', '3');
                    if (v === null) { return; }
                    var n = parseInt(v, 10);
                    if (!n || n <= 0) { return; }
                    api('wallet/redeem?user=' + encodeURIComponent(uid) + '&coins=' + n, 'POST')
                        .then(function (r) {
                            if (r.Error === 'balance') { Dashboard.alert('Not enough coins.'); }
                            else if (r.Error === 'dailycap') { Dashboard.alert('Daily redeem cap reached.'); }
                            load();
                        }, function () { Dashboard.alert('Redeem failed.'); });
                };
            });
            el.querySelectorAll('.btnAdjustCoins').forEach(function (b) {
                b.onclick = function () {
                    var uid = this.getAttribute('data-userid');
                    var v = prompt('Coin adjustment (negative to remove):', '1');
                    if (v === null) { return; }
                    var n = parseInt(v, 10);
                    if (!n) { return; }
                    api('wallet/adjust?user=' + encodeURIComponent(uid) + '&coins=' + n, 'POST')
                        .then(function (wallet) { renderWallet(uid, wallet); },
                              function () { Dashboard.alert('Adjust failed.'); });
                };
            });
        }

        function loadWallet(userId) {
            api('wallet/' + encodeURIComponent(userId)).then(function (w) {
                renderWallet(userId, w);
            }, function () {
                var el = page.querySelector('#wallet-' + userId);
                if (el) { el.textContent = 'Coins unavailable.'; }
            });
        }

        function loadHistory(userId) {
            api('history/' + encodeURIComponent(userId) + '?days=7').then(function (hist) {
                var el = page.querySelector('#hist-' + userId);
                if (!el) { return; }
                if (!hist || !hist.length) { el.textContent = 'No history yet.'; return; }
                var total = hist.reduce(function (a, h) { return a + h.SecondsWatchedTotal; }, 0);
                var avg = total / hist.length;
                el.textContent = 'Last ' + hist.length + ' day(s): avg ' + fmt(avg) + '/day, total ' + fmt(total) + '.';
            }, function () {});
        }

        function load() {
            if (!token) { return; }
            api('status').then(function (list) {
                page.querySelector('#dashStatus').textContent =
                    (list.length ? list.length + ' user(s) tracked.' : 'No enabled users. Enable kids in plugin settings.') +
                    ' Updated ' + new Date().toLocaleTimeString() + '.';
                page.querySelector('#cards').innerHTML = list.map(renderCard).join('');
                wire();
                list.forEach(function (s) { loadHistory(s.UserId); loadWallet(s.UserId); });
            }, function () {
                page.querySelector('#dashStatus').textContent = 'Failed to load status. Check the API token in settings.';
            });
        }

        document.querySelector('#kidsLimitDashboardPage').addEventListener('pageshow', function () {
            page = this;
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration(pluginId).then(function (cfg) {
                token = cfg.BonusApiToken || '';
                chores = cfg.Chores || [];
                Dashboard.hideLoadingMsg();
                if (!token) {
                    page.querySelector('#dashStatus').innerHTML =
                        'No API token is set. Open <a href="configurationpage?name=KidsLimitConfig">plugin settings</a> and generate one.';
                    return;
                }
                load();
                refreshTimer = setInterval(load, 15000);
            });

            page.querySelector('#btnRefresh').addEventListener('click', load);
        });

        document.querySelector('#kidsLimitDashboardPage').addEventListener('pagehide', function () {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        });
    })();
    </script>
</div>
</body>
</html>
